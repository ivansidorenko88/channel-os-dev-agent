services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: channel_os_dev_agent
      POSTGRES_USER: channelos
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U channelos -d channel_os_dev_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
